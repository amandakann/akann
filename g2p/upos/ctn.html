                 1  punct        1:punct        SpacesAfter=\\n", "pred_text": "# sent_id = grammar_Morphology_55a\n# text = Pheĩmalodheĩmaphe utopi hou.\n# english = I hear [one should] take off his cap.\n1-3  Pheĩmalodheĩmaphe  _  _      _  _  _  _      _  AlignGloss=Pheĩmalodheĩmaphe\n1    Pheĩmadheĩmaphe    _  PUNCT  _  _  0  punct  _  AlignedToken=[|AlignGloss=take_off|Gloss=take_off-INF-COMPL1-INF|MSeg=phend-madhend-ma\n2    lo                 _  PRON   _  _  3  nsubj  _  AlignedToken=I|AlignGloss=SURP|Gloss=SURP|MSeg=lo\n3    phe                _  VERB   _  _  0  root   _  AlignedToken=hear|AlignGloss=REP|Gloss=REP|MSeg=phe\n4    utopi              _  NOUN   _  _  0  obj    _  AlignedToken=cap|AlignGloss=cap|Gloss=3SG.POSS-cap|MSeg=u-ʈopi\n5    hou                _  PRON   _  _  0  nsubj  _  AlignedToken=one|AlignGloss=EMO|Gloss=EMO|MSeg=hʌu|SpaceAfter=No\n6    .                  _  PUNCT  _  _  3  punct  _  AlignedToken=.|AlignGloss=.|SpacesAfter=\\n", "token_ids": ["3"]}]};
const labels = Object.keys(M).sort();
const tbl = document.getElementById('tbl');

let maxV = 1;
for (const g of labels)
  for (const p of labels)
    if (g !== p && M[g] && M[g][p]) maxV = Math.max(maxV, M[g][p]);

const hrow = tbl.insertRow();
const corner = document.createElement('th');
corner.className = 'rh';
corner.textContent = 'gold \ pred';
hrow.appendChild(corner);
for (const p of labels) {
  const th = document.createElement('th');
  th.className = 'col-label';
  th.textContent = p;
  hrow.appendChild(th);
}

let sel = null;
for (const g of labels) {
  const row = tbl.insertRow();
  const rh = document.createElement('th');
  rh.className = 'rh';
  rh.textContent = g;
  row.appendChild(rh);
  for (const p of labels) {
    const td = row.insertCell();
    const cnt = (M[g] && M[g][p]) || 0;
    td.textContent = cnt || '';
    if (g === p) {
      td.className = 'diag';
      td.title = cnt + ' correct';
    } else if (cnt > 0) {
      const t = cnt / maxV;
      const ch = Math.round(255 * (1 - t * 0.8));
      td.style.background = 'rgb(255,' + ch + ',' + ch + ')';
      td.id = g + '--' + p;
      td.className = 'click';
      td.title = 'gold:' + g + ' → pred:' + p + ': ' + cnt;
      td.addEventListener('click', (function(gl, pl, c, cell) {
        return function() { show(gl, pl, c, cell); };
      })(g, p, cnt, td));
    }
  }
}

function show(gL, pL, cnt, cell) {
  history.replaceState(null, '', '#' + gL + '--' + pL);
  if (sel) sel.classList.remove('sel');
  cell.classList.add('sel');
  sel = cell;
  document.getElementById('sel-hdr').textContent =
    'gold: ' + gL + '  →  pred: ' + pL + '  (' + cnt + ' sentence' + (cnt !== 1 ? 's' : '') + ')';
  document.getElementById('sentences-section').scrollIntoView({ behavior: 'smooth' });
  const list = document.getElementById('list');
  list.innerHTML = '';
  const sents = S[gL + '→' + pL] || [];
  for (const s of sents) {
    const d = document.createElement('div');
    d.className = 'pair';
    d.innerHTML =
      '<div class="pair-id">' + esc(s.sent_id) + '</div>' +
      '<div class="cols">' +
      '<div class="col"><div class="col-hdr">Gold</div><pre>' + renderPre(s.gold_text, s.token_ids) + '</pre></div>' +
      '<div class="col"><div class="col-hdr">Predicted</div><pre>' + renderPre(s.pred_text, s.token_ids) + '</pre></div>' +
      '</div>';
    list.appendChild(d);
  }
}

if (location.hash) {
  const cell = document.getElementById(location.hash.slice(1));
  if (cell) { cell.click(); cell.scrollIntoView({ behavior: 'instant', block: 'center' }); }
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderPre(text, tokenIds) {
  const ids = new Set(tokenIds || []);
  return text.split('\n').map(line => {
    const m = line.match(/^\s*(\d+)\s/);
    if (m && ids.has(m[1])) {
      return '<span class="hl-line">' + esc(line) + '</span>';
    }
    return esc(line);
  }).join('\n');
}
