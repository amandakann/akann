understrappers, (4) the menials.","# ptext(86) = tatra sarvezu eva nagara pattana aDi saTAna Kewaka vawa bARa agra hAra kAnana vana sTAnezu ekaH eva siMha sTAnIyaH Bavati","# ryder(86) = In all cities, capitals, towns, hamlets, market-centers, settlements, border-posts, land-grants, monasteries, and communities there is just one occupant of the lion's post.","# ptext(87) = katipayAH siMha anu yAyinaH tatra carAH","# ryder(87) = Relatively few are active as the lion's guard.","# ptext(88) = kAkara vargaH maDyama vargaH","# ryder(88) = The understrappers are the indiscriminate throng.","# ptext(89) = kim vfttAH vana anta sTAna vAsinaH","# ryder(89) = The menials are posted on the outskirts.","# ptext(90) = uttama maDyama aDamAH trayaH iti","# ryder(90) = The three classes are each divided into members high, middle, and low.","# pparagraph","# ptext(91) = aTa piNgalakaH sa amAtyaH sa suhft janaH Cattra cAmara vyajana vAhana vilAsa vistAra vi rahitam a kftrima sAhasa rasa eka anta darpa ut hatam aBagramAna mada utsekam a sahamAnatayA svayam grAha nir aNkuSa darSita ESvaryam an aBijYam itara jana sevitAnAm kfpaRa vacasAm amarza roza saMramBa garva prasTAnam a kAtaratva puruzArTam anu kzipta aYjali puwam a dInam a BItam a kfta cAwu karma upAyam vyavasAya pOruza aBimAna ava stamBa BAsuram an anya sevi niHsaNgam an AtmamBari paropakAra suKa vi akta puruza kAra Palam a pari BUtam a kfSam a tucCam apa gata durga prati samskAra cittam a gaRita aya vyayam a vilomam an A yattam ut hata upa arjita arjita pratApa vizamam azAqruRya sampraDAraRam a praharaRa ABaraRam a sADAraRa viBava grAsam a parokza vfttam an A SaNkanIyam an apekzita kalatra parzRi grAha asAra Akrandam a nindyam a Gawita a Sikzita astf ara yogam an icCa viGAti parijana nirapekza labDa grAsa nivAsa sOhityam vana Antare niHSaNkam niHsADvasam uccEH SiraH rAjatvam anu baBUva","# ryder(91) = Now Rusty, with counselors and intimates, enjoyed a kingship of the following order. His royal office, though lacking the pomp of umbrella, flyflap, fan, vehicle, and amorous display, was held erect by sheer pride in the sentiment of unaffected pluck. It showed unbroken haughtiness and abounding self-esteem. It manifested a native zeal for unchecked power that brooked no rival. It was ignorant of cringing speech, which it delegated to those who like that sort of thing. It functioned by means of impatience, wrath, haste, and hauteur. Its manly goal was fearlessness, disdaining fawning, strange to obsequiousness, unalarmed. It made use of no wheedling artifices, but glittered in its reliance on enterprise, valor, dignity. It was independent, unattached, free from selfish worry. It advertised the reward of manliness by its pleasure in benefiting others. It was unconquered, free from constraint and meanness, while it had no thought of elaborating defensive works. It kept no account of revenue and expenditure. It knew no deviousness nor time-serving, but was prickly with the energy earned by loftiness of spirit. It wasted no deliberation on the conventional six expedients, nor did it hoard weapons or jewelry. It had an uncommon appetite for power, never adopted subterfuges, was never an object of suspicion. It paid no heed to wives or ambush-layers, to their torrents of tears or their squeals. It was without reproach. It had no artificial training in the use of weapons, but it did not disappoint expectations. It found satisfactory food and shelter without dependence on servants. It had no timidity about any foreign forest, and no alarms. Its head was high.","# ptext(92) = uktam ca","# ryder(92) = As the proverb says:","# ptext(93) = ekAkini vanavAsinI a rAja lakzmaRI a nIti SAstra jYe sattva utkawe mfga patO rAjA iti giraH pari namanti","# ryder(93) = The lion needs, in forest station, // No trappings and no education, // But lonely power and pride; // And all the song his subjects sing, // Is in the words: \"O King! O King!\" // No epithet beside.","# ptext(94) = kim ca","# ryder(94) = And again:       const t = cnt / maxV;
      const ch = Math.round(255 * (1 - t * 0.8));
      td.style.background = 'rgb(255,' + ch + ',' + ch + ')';
      td.id = g + '--' + p;
      td.className = 'click';
      td.title = 'gold:' + g + ' → pred:' + p + ': ' + cnt;
      td.addEventListener('click', (function(gl, pl, c, cell) {
        return function() { show(gl, pl, c, cell); };
      })(g, p, cnt, td));
    }
  }
}

function show(gL, pL, cnt, cell) {
  history.replaceState(null, '', '#' + gL + '--' + pL);
  if (sel) sel.classList.remove('sel');
  cell.classList.add('sel');
  sel = cell;
  document.getElementById('sel-hdr').textContent =
    'gold: ' + gL + '  →  pred: ' + pL + '  (' + cnt + ' sentence' + (cnt !== 1 ? 's' : '') + ')';
  document.getElementById('sentences-section').scrollIntoView({ behavior: 'smooth' });
  const list = document.getElementById('list');
  list.innerHTML = '';
  const corpus = (TREEBANK.startsWith('UD_') ? TREEBANK : 'UD_' + TREEBANK) + '@2.18';
  const sents = S[gL + '→' + pL] || [];
  for (const [sid, tids] of sents) {
    const sent = SENTS[sid] || {};
    const grewUrl = 'https://universal.grew.fr/?corpus=' + corpus +
      '&request=' + encodeURIComponent('pattern { meta.sent_id = "' + sid + '" }');
    const d = document.createElement('div');
    d.className = 'pair';
    d.innerHTML =
      '<div class="pair-id"><a href="' + grewUrl + '" target="_blank">' + esc(sid) + '</a></div>' +
      '<div style="overflow-x:auto">' + renderTable(sent.comments, sent.rows, tids) + '</div>';
    list.appendChild(d);
  }
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

const HDRS = ['ID','FORM','LEMMA','UPOS','UPOS·p','HEAD','HEAD·p','DEPREL','DEPREL·p','AlignedToken','AlignGloss','Gloss','FEATS'];
const PRED_COLS = new Set([4, 6, 8]);
const PRED_GOLD = new Map([[4, 3], [6, 5], [8, 7]]);

function renderTable(comments, rows, tokenIds) {
  const ids = new Set(tokenIds || []);
  let h = '';
  if (comments && comments.length)
    h += '<div class="sent-comments">' + comments.map(esc).join('<br>') + '</div>';
  h += '<table class="sent-tbl"><thead><tr>';
  HDRS.forEach((hdr, i) => {
    h += '<th' + (PRED_COLS.has(i) ? ' class="pred-col"' : '') + '>' + esc(hdr) + '</th>';
  });
  h += '</tr></thead><tbody>';
  for (const row of rows) {
    const hl = ids.has(row[0]);
    h += '<tr' + (hl ? ' class="hl-line"' : '') + '>';
    row.forEach((cell, i) => {
      const goldIdx = PRED_GOLD.get(i);
      const mismatch = goldIdx !== undefined && cell !== row[goldIdx];
      const cls = (PRED_COLS.has(i) ? 'pred-col' : '') + (mismatch ? ' mismatch' : '');
      h += '<td' + (cls.trim() ? ' class="' + cls.trim() + '"' : '') + '>' + esc(cell) + '</td>';
    });
    h += '</tr>';
  }
  h += '</tbody></table>';
  return h;
}

if (location.hash) {
  const cell = document.getElementById(location.hash.slice(1));
  if (cell) { cell.click(); cell.scrollIntoView({ behavior: 'instant', block: 'center' }); }
}
</script>
