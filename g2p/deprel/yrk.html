const TREEBANK = "Nenets-Tundra";
const labels = Object.keys(M).sort();
const tbl = document.getElementById('tbl');

let maxV = 1;
for (const g of labels)
  for (const p of labels)
    if (g !== p && M[g] && M[g][p]) maxV = Math.max(maxV, M[g][p]);

const hrow = tbl.insertRow();
const corner = document.createElement('th');
corner.className = 'rh';
corner.textContent = 'gold \ pred';
hrow.appendChild(corner);
for (const p of labels) {
  const th = document.createElement('th');
  th.className = 'col-label';
  th.textContent = p;
  hrow.appendChild(th);
}

let sel = null;
for (const g of labels) {
  const row = tbl.insertRow();
  const rh = document.createElement('th');
  rh.className = 'rh';
  rh.textContent = g;
  row.appendChild(rh);
  for (const p of labels) {
    const td = row.insertCell();
    const cnt = (M[g] && M[g][p]) || 0;
    td.textContent = cnt || '';
    if (g === p) {
      td.className = 'diag';
      td.title = cnt + ' correct';
    } else if (cnt > 0) {
      const t = cnt / maxV;
      const ch = Math.round(255 * (1 - t * 0.8));
      td.style.background = 'rgb(255,' + ch + ',' + ch + ')';
      td.id = g + '--' + p;
      td.className = 'click';
      td.title = 'gold:' + g + ' → pred:' + p + ': ' + cnt;
      td.addEventListener('click', (function(gl, pl, c, cell) {
        return function() { show(gl, pl, c, cell); };
      })(g, p, cnt, td));
    }
  }
}

function show(gL, pL, cnt, cell) {
  history.replaceState(null, '', '#' + gL + '--' + pL);
  if (sel) sel.classList.remove('sel');
  cell.classList.add('sel');
  sel = cell;
  document.getElementById('sel-hdr').textContent =
    'gold: ' + gL + '  →  pred: ' + pL + '  (' + cnt + ' sentence' + (cnt !== 1 ? 's' : '') + ')';
  document.getElementById('sentences-section').scrollIntoView({ behavior: 'smooth' });
  const list = document.getElementById('list');
  list.innerHTML = '';
  const corpus = (TREEBANK.startsWith('UD_') ? TREEBANK : 'UD_' + TREEBANK) + '@2.18';
  const sents = S[gL + '→' + pL] || [];
  for (const [sid, tids] of sents) {
    const sent = SENTS[sid] || {};
    const grewUrl = 'https://universal.grew.fr/?corpus=' + corpus +
      '&request=' + encodeURIComponent('pattern { meta.sent_id = "' + sid + '" }');
    const d = document.createElement('div');
    d.className = 'pair';
    d.innerHTML =
      '<div class="pair-id"><a href="' + grewUrl + '" target="_blank">' + esc(sid) + '</a></div>' +
      '<div style="overflow-x:auto">' + renderTable(sent.comments, sent.rows, tids) + '</div>';
    list.appendChild(d);
  }
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

const HDRS = ['ID','FORM','LEMMA','UPOS','UPOS·p','HEAD','HEAD·p','DEPREL','DEPREL·p','AlignedToken','AlignGloss','Gloss','FEATS'];
const PRED_COLS = new Set([4, 6, 8]);
const PRED_GOLD = new Map([[4, 3], [6, 5], [8, 7]]);

function renderTable(comments, rows, tokenIds) {
  const ids = new Set(tokenIds || []);
  let h = '';
  if (comments && comments.length)
    h += '<div class="sent-comments">' + comments.map(esc).join('<br>') + '</div>';
  h += '<table class="sent-tbl"><thead><tr>';
  HDRS.forEach((hdr, i) => {
    h += '<th' + (PRED_COLS.has(i) ? ' class="pred-col"' : '') + '>' + esc(hdr) + '</th>';
  });
  h += '</tr></thead><tbody>';
  for (const row of rows) {
    const hl = ids.has(row[0]);
    h += '<tr' + (hl ? ' class="hl-line"' : '') + '>';
    row.forEach((cell, i) => {
      const goldIdx = PRED_GOLD.get(i);
      const mismatch = goldIdx !== undefined && cell !== row[goldIdx];
      const cls = (PRED_COLS.has(i) ? 'pred-col' : '') + (mismatch ? ' mismatch' : '');
      h += '<td' + (cls.trim() ? ' class="' + cls.trim() + '"' : '') + '>' + esc(cell) + '</td>';
    });
    h += '</tr>';
  }
  h += '</tbody></table>';
  return h;
}

if (location.hash) {
  const cell = document.getElementById(location.hash.slice(1));
  if (cell) { cell.click(); cell.scrollIntoView({ behavior: 'instant', block: 'center' }); }
}
